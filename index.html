<body>
    <div class="container">
        <h1>Vegan Impact Calculator</h1>
        <label for="years">Enter number of years you've been vegan:</label>
        <input type="number" id="years" min="0" placeholder="Years as vegan">
        <button onclick="calculateImpact()">Calculate</button>

        <div class="section" id="chickens">
            <h2>Chickens</h2>
            <div class="circle-container" id="chickenCircles"></div>
        </div>

        <div class="section" id="pigs">
            <h2>Pigs</h2>
            <div class="circle-container" id="pigCircles"></div>
        </div>

        <div class="section" id="cows">
            <h2>Cows</h2>
            <div class="circle-container" id="cowCircles"></div>
        </div>

        <div class="section" id="fish">
            <h2>Fish</h2>
            <div class="circle-container" id="fishCircles"></div>
        </div>
    </div>
</body>
